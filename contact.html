<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himanshu Shrestha - Contact</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">

    <style>
        .contact-header {
            text-align: center;
            padding: 50px 20px;
            background-color: #0d1b2a;
            border-bottom: 2px solid #e9ecef;
        }

        .contact-header h1 {
            font-size: 36px;
            color: #fff;
        }

        .contact-header p {
            color: #fff;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-brand"><a href="index.html">HS</a></div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="interests.html">Interests</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <section class="page-header contact-header">
        <h1>Contact Me</h1>
        <p>Feel free to reach out. I would love to hear from you!</p>
    </section>

    <section class="content-section">
        <div class="container">
            <div class="contact-wrapper">

                <div class="contact-form-container">
                    <form id="contactForm" class="contact-form">

                        <div class="form-group">
                            <label for="name">Full Name:</label>
                            <input type="text" id="name" name="name" placeholder="Enter your name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address:</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>

                        <div class="form-group">
                            <label for="subject">Subject:</label>
                            <input type="text" id="subject" name="subject" placeholder="Enter subject">
                        </div>

                        <div class="form-group">
                            <label for="message">Message:</label>
                            <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                        </div>

                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>

                    <div id="formMessage" class="form-message"></div>
                </div>

                <div class="contact-info">
                    <h2>Contact Information</h2>

                    <div class="info-item">
                        <span class="info-icon">📧</span>
                        <div>
                            <h4>Email</h4>
                            <p>himanshu@example.com</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <span class="info-icon">📍</span>
                        <div>
                            <h4>Location</h4>
                            <p>Nepal</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <span class="info-icon">📱</span>
                        <div>
                            <h4>Phone</h4>
                            <p>+977-XXXXXXXXXX</p>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <p>©2026 Himanshu Shrestha. All rights reserved.</p>
    </footer>

</body>
</html>
